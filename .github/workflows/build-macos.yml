name: Build macOS DMG + PKG

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always
  APP_PRODUCT_NAME: "Vergunning Intake Pro"
  APP_IDENTIFIER: "nl.knowledgebydata.vergunning-intake-pro"
  ARTIFACT_PREFIX: "vergunning-intake-pro"

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm install

      - name: Regenerate macOS icon (icns)
        shell: bash
        run: |
          ICONSET_DIR=$(mktemp -d)/AppIcon.iconset
          mkdir -p "$ICONSET_DIR"

          # Use the 128x128@2x (256px) as source for all sizes
          SRC="src-tauri/icons/128x128@2x.png"

          sips -z 16 16 "$SRC" --out "$ICONSET_DIR/icon_16x16.png"
          sips -z 32 32 "$SRC" --out "$ICONSET_DIR/icon_16x16@2x.png"
          sips -z 32 32 "$SRC" --out "$ICONSET_DIR/icon_32x32.png"
          sips -z 64 64 "$SRC" --out "$ICONSET_DIR/icon_32x32@2x.png"
          sips -z 128 128 "$SRC" --out "$ICONSET_DIR/icon_128x128.png"
          sips -z 256 256 "$SRC" --out "$ICONSET_DIR/icon_128x128@2x.png"
          sips -z 256 256 "$SRC" --out "$ICONSET_DIR/icon_256x256.png"

          iconutil -c icns "$ICONSET_DIR" -o src-tauri/icons/icon.icns
          echo "macOS icon regenerated from PNG sources"

      - name: Build Tauri app (macOS)
        run: npm run tauri:build

      - name: Ad-hoc code sign and rebuild DMG
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          echo "Found app: $APP_PATH"
          xattr -cr "$APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"
          OLD_DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" -maxdepth 1 | head -1)
          DMG_NAME=$(basename "$OLD_DMG")
          rm -f "$OLD_DMG"
          APP_NAME=$(basename "$APP_PATH" .app)
          hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "src-tauri/target/release/bundle/dmg/$DMG_NAME"
          echo "DMG recreated with signed app: $DMG_NAME"

      - name: Build PKG installer
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$APP_PATH" .app)
          APP_VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\(.*\)".*/\1/')

          echo "Building PKG for: $APP_NAME v$APP_VERSION"

          PKG_ROOT=$(mktemp -d)
          PKG_SCRIPTS=$(mktemp -d)
          PKG_OUTPUT="src-tauri/target/release/bundle/pkg"
          mkdir -p "$PKG_OUTPUT"
          mkdir -p "$PKG_ROOT/Applications"

          cp -R "$APP_PATH" "$PKG_ROOT/Applications/"

          cat > "$PKG_SCRIPTS/postinstall" << 'POSTINSTALL'
          #!/bin/bash
          APP_INSTALL_PATH="/Applications/APP_NAME_PLACEHOLDER.app"
          if [ -d "$APP_INSTALL_PATH" ]; then
            xattr -cr "$APP_INSTALL_PATH"
            codesign --force --deep --sign - "$APP_INSTALL_PATH" 2>/dev/null || true
            chmod -R 755 "$APP_INSTALL_PATH"
            echo "Installatie voltooid: quarantine verwijderd en app gesigneerd."
          fi
          exit 0
          POSTINSTALL

          sed -i '' "s|APP_NAME_PLACEHOLDER|$APP_NAME|g" "$PKG_SCRIPTS/postinstall"
          chmod +x "$PKG_SCRIPTS/postinstall"

          PKG_FILENAME="${ARTIFACT_PREFIX}-${APP_VERSION}-macos-installer.pkg"
          pkgbuild \
            --root "$PKG_ROOT" \
            --scripts "$PKG_SCRIPTS" \
            --identifier "$APP_IDENTIFIER" \
            --version "$APP_VERSION" \
            --install-location "/" \
            "$PKG_OUTPUT/$PKG_FILENAME"

          echo "PKG created: $PKG_FILENAME"
          ls -lh "$PKG_OUTPUT/$PKG_FILENAME"

          rm -rf "$PKG_ROOT" "$PKG_SCRIPTS"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 30
          if-no-files-found: warn

      - name: Upload PKG installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-macos-pkg
          path: src-tauri/target/release/bundle/pkg/*.pkg
          retention-days: 30
          if-no-files-found: warn

      - name: Build summary
        shell: bash
        run: |
          echo "## macOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Product:** ${{ env.APP_PRODUCT_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bundles:** DMG (ad-hoc signed) + PKG installer" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloads" >> $GITHUB_STEP_SUMMARY
          echo "- **PKG installer** (aanbevolen): installeert automatisch in /Applications en verwijdert quarantine" >> $GITHUB_STEP_SUMMARY
          echo "- **DMG**: handmatige installatie, sleep naar /Applications" >> $GITHUB_STEP_SUMMARY
