name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      bundle_type:
        description: 'Installer type'
        required: true
        default: 'nsis'
        type: choice
        options:
          - nsis
          - msi
          - both

  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always
  APP_PRODUCT_NAME: "Vergunning Intake Pro"
  APP_IDENTIFIER: "nl.knowledgebydata.vergunning-intake-pro"
  ARTIFACT_PREFIX: "vergunning-intake-pro"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm install

      - name: Determine bundle type
        id: bundle
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ github.event.inputs.bundle_type }}"
          else
            TYPE="both"
          fi

          if [ "$TYPE" = "both" ]; then
            echo "args=" >> $GITHUB_OUTPUT
          else
            echo "args=--bundles $TYPE" >> $GITHUB_OUTPUT
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Build Tauri app (unsigned)
        run: npm run tauri:build -- ${{ steps.bundle.outputs.args }}

      - name: Upload NSIS installer
        if: steps.bundle.outputs.type == 'nsis' || steps.bundle.outputs.type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload MSI installer
        if: steps.bundle.outputs.type == 'msi' || steps.bundle.outputs.type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9][0-9.]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "${{ env.APP_PRODUCT_NAME }} v${{ steps.version.outputs.version }}"
          body: "Automatische release vanuit GitHub Actions build."
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        shell: bash
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Product:** ${{ env.APP_PRODUCT_NAME }} v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bundle:** ${{ steps.bundle.outputs.type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Signed:** No (YubiKey pending)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the installer from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
